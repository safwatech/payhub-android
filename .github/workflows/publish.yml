name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.sha }}

      - name: Stage shared test vectors at the path tests expect
        run: |
          # Tests reference File("../../shared/test-vectors/..."). On the
          # mirror, vectors live in vendor/shared/test-vectors/ — stage a
          # sibling 'shared/' so both monorepo and mirror runs resolve.
          mkdir -p ../shared
          cp -R vendor/shared/test-vectors ../shared/

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Gradle 8.10
        # No gradlew wrapper is checked in. Pin Gradle to a version
        # current with AGP 8.5 (which requires ≥ 8.7).
        run: |
          curl -fsSL -o /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.10-bin.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.10/bin" >> "$GITHUB_PATH"

      - name: Publish to Maven Central via vanniktech-maven-publish
        env:
          # Sonatype Central Portal credentials (auto-generated user token).
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.CENTRAL_PASSWORD }}
          # GPG key + passphrase, in-memory.
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: gradle :payhub:publishToMavenCentral --no-configuration-cache --stacktrace
